name: Update Language Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Fetch language data
        id: langs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          declare -A LANG_TOTAL
          for repo in $(gh api graphql -f query='{ viewer { repositories(first: 100, privacy: PUBLIC) { nodes { name languages(first: 10) { nodes { name } edges { size } } } } } }' --jq '.data.viewer.repositories.nodes[] | .name'); do
            data=$(gh api "repos/$GITHUB_REPOSITORY_OWNER/$repo/languages" 2>/dev/null || echo '{}')
            for lang in $(echo "$data" | jq -r 'keys[]'); do
              size=$(echo "$data" | jq -r --arg l "$lang" '.[$l]')
              LANG_TOTAL[$lang]=$(( ${LANG_TOTAL[$lang]:-0} + size ))
            done
          done
          total=0
          for size in "${LANG_TOTAL[@]}"; do total=$((total + size)); done
          if [ "$total" -eq 0 ]; then echo "No data"; exit 1; fi
          result=""
          for lang in "${!LANG_TOTAL[@]}"; do
            size=${LANG_TOTAL[$lang]}
            pct=$(echo "scale=1; $size * 100 / $total" | bc)
            result="$result$pct $lang\n"
          done
          echo -e "$result" | sort -rn > /tmp/langs.txt
          cat /tmp/langs.txt

      - name: Generate SVG
        run: |
          python3 << 'PYEOF'
          colors = {"Python":"#3776AB","Java":"#ED8B00","JavaScript":"#F7DF1E","TypeScript":"#3178C6","Shell":"#89e051","HTML":"#E34F26","CSS":"#1572B6","Go":"#00ADD8","Rust":"#DEA584","C":"#555555","C++":"#00599C","Lua":"#000080","Kotlin":"#7F52FF","Swift":"#F05138","Ruby":"#CC342D","PHP":"#777BB4","Dockerfile":"#2496ED","YAML":"#CB171E","Markdown":"#083fa1"}
          default_color = "#666688"
          langs = []
          with open("/tmp/langs.txt") as f:
              for line in f:
                  parts = line.strip().split()
                  if len(parts) == 2:
                      pct, name = float(parts[0]), parts[1]
                      if pct >= 0.5:
                          langs.append((name, pct))
          bar_height = 16; bar_gap = 8; top_margin = 42; bottom_margin = 20
          chart_height = top_margin + len(langs) * (bar_height + bar_gap) + bottom_margin
          max_bar_width = 250
          lines = []
          lines.append(f'<svg xmlns="http://www.w3.org/2000/svg" width="400" height="{chart_height}" viewBox="0 0 400 {chart_height}">')
          lines.append('  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1a1b2e"/><stop offset="100%" style="stop-color:#2d1b4e"/></linearGradient></defs>')
          lines.append(f'  <rect width="400" height="{chart_height}" rx="10" fill="url(#bg)" stroke="#444466" stroke-width="1" stroke-opacity="0.3"/>')
          lines.append('  <text x="20" y="28" font-family="Segoe UI,Arial,sans-serif" font-size="13" fill="#8888aa">Languages</text>')
          for i, (name, pct) in enumerate(langs):
              y = top_margin + i * (bar_height + bar_gap)
              bar_w = max_bar_width * (pct / 100)
              color = colors.get(name, default_color)
              lines.append(f'  <rect x="20" y="{y}" width="{bar_w:.0f}" height="{bar_height}" rx="8" fill="{color}" opacity="0.8"><animate attributeName="width" from="0" to="{bar_w:.0f}" dur="1.5s" fill="freeze"/></rect>')
              lines.append(f'  <text x="280" y="{y+12}" font-family="Segoe UI,Arial,sans-serif" font-size="11" fill="#aaaacc">{name}  {pct:.1f}%</text>')
          lines.append('</svg>')
          with open("lang-stats.svg", "w") as f:
              f.write("\n".join(lines))
          print("SVG generated")
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add lang-stats.svg
          git diff --staged --quiet || git commit -m "chore: update language stats [skip ci]"
          git push
